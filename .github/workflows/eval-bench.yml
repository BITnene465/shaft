name: eval-bench

on:
  pull_request:
    paths:
      - ".github/workflows/eval-bench.yml"
      - "docker/inference/**"
      - "projects/eval_bench/**"
      - "src/shaft/codec/**"
      - "src/shaft/utils/qwen_pixel_budget.py"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - feat/eval-bench
    paths:
      - ".github/workflows/eval-bench.yml"
      - "docker/inference/**"
      - "projects/eval_bench/**"
      - "src/shaft/codec/**"
      - "src/shaft/utils/qwen_pixel_budget.py"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  backend-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install eval-bench test environment
        run: uv sync --frozen --extra dev --extra eval-bench

      - name: Run eval-bench backend contract tests
        run: |
          set +e
          uv run pytest -q projects/eval_bench/tests \
            -m "not smoke and not integration and not manual" \
            2>&1 | tee "$RUNNER_TEMP/eval-bench-backend.log"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 80 "$RUNNER_TEMP/eval-bench-backend.log" | while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\r'/'%0D'}"
              echo "::error title=backend-contract::$line"
            done
          fi
          exit "$status"

  frontend-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: projects/eval_bench/frontend/package-lock.json

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dashboard environment
        run: uv sync --frozen --extra dev --extra eval-bench

      - name: Install frontend dependencies
        working-directory: projects/eval_bench/frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: projects/eval_bench/frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: projects/eval_bench/frontend
        run: npm run build

      - name: Start dashboard
        run: |
          uv run python scripts/eval_bench.py serve-dashboard \
            --host 127.0.0.1 \
            --port 8765 \
            --store-root "$RUNNER_TEMP/eval_bench_store" \
            --frontend-dist projects/eval_bench/frontend/dist \
            > "$RUNNER_TEMP/eval-bench-dashboard.log" 2>&1 &
          for attempt in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8765/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/eval-bench-dashboard.log"
          exit 1

      - name: Run frontend UI contracts
        working-directory: projects/eval_bench/frontend
        run: npm run test:ui-contracts

      - name: Run frontend layout smoke
        working-directory: projects/eval_bench/frontend
        env:
          EVAL_BENCH_URL: http://127.0.0.1:8765/
        run: |
          set +e
          npm run test:layout 2>&1 | tee "$RUNNER_TEMP/eval-bench-layout.log"
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 80 "$RUNNER_TEMP/eval-bench-layout.log" | while IFS= read -r line; do
              line="${line//'%'/'%25'}"
              line="${line//$'\r'/'%0D'}"
              echo "::error title=frontend-layout::$line"
            done
          fi
          exit "$status"
