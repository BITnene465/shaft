name: release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install release validation environment
        run: uv sync --locked --extra dev --extra train --extra rlhf

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(uv run --locked python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$GITHUB_REF_NAME" != "v$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match project version v$package_version" >&2
            exit 1
          fi

      - name: Run release validation suites
        run: |
          uv run --locked ruff check src/shaft tests
          uv run --locked pytest tests --suite framework
          uv run --locked pytest tests --suite smoke

      - name: Build source and wheel distributions
        run: uv build --sdist --wheel --out-dir dist

      - name: Verify wheel installs and imports
        run: |
          uv venv "$RUNNER_TEMP/release-venv" --python 3.11
          uv pip install --python "$RUNNER_TEMP/release-venv/bin/python" dist/*.whl
          "$RUNNER_TEMP/release-venv/bin/python" -c 'import importlib.metadata, shaft; assert shaft.__version__ == importlib.metadata.version("shaft"); print(shaft.__file__)'

      - name: Upload package artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: shaft-packages
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: shaft-packages
          path: dist

      - name: Publish GitHub Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Shaft $GITHUB_REF_NAME"
          fi
