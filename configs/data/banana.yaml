# Banana SFT 数据集 catalog。
# 说明：
# 1. 总任务名为 `banana`。
# 2. 子任务名保持为 `grounding_arrow`、`grounding_layout`、`point_arrow`。
# 3. 当前训练配置使用 `mix_strategy: interleave_under`，`weight` 会决定每个 epoch 的任务配比。
# 4. 当前 SFT mix 权重为 grounding_arrow=2、grounding_layout=1、point_arrow=1。
datasets:
  grounding_arrow:
    source_type: jsonl_sft
    train_path: ../../data/grounding_arrow/sft/train.jsonl
    val_path: ../../data/grounding_arrow/sft/val.jsonl
    weight: 2
    enabled: true
    use_for_eval: true
    help: banana / grounding_arrow SFT 数据
    tags: [banana, arrow, grounding, real, sft]

  grounding_layout:
    source_type: jsonl_sft
    train_path: ../../data/grounding_layout/sft/train.jsonl
    val_path: ../../data/grounding_layout/sft/val.jsonl
    weight: 1
    enabled: true
    use_for_eval: true
    help: banana / grounding_layout SFT 数据
    tags: [banana, layout, grounding, real, sft]

  point_arrow:
    source_type: jsonl_sft
    train_path: ../../data/point_arrow/sft/train.jsonl
    val_path: ../../data/point_arrow/sft/val.jsonl
    weight: 1
    enabled: true
    use_for_eval: true
    help: banana / point_arrow SFT 数据
    tags: [banana, arrow, point, keypoint, real, sft]
