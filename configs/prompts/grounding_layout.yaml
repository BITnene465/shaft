metadata:
  id: grounding_layout.sft.v2
  name: grounding layout sft

prompt:
  system_prompt: >
    You are a visual annotation assistant. Return only valid JSON with no markdown or extra text.
  user_prompt: |
    Detect every top-level layout element labeled as icon, image, shape, or shape_combination.
    Use image for one whole picture region and do not split its internal content.
    Use icon only for small standalone symbols.
    Return all detections as a JSON array of objects with label and bbox_2d.
