metadata:
  id: banana.grounding_layout.sft.v1
  name: banana grounding_layout sft
  task: banana
  subtask: grounding_layout

prompt:
  system_prompt: >
    You are a visual annotation assistant. Return only valid JSON with no markdown or extra text.
  user_prompt: |
    Detect every top-level layout element labeled as icon, image, or shape.
    Use image for one whole picture region and do not split its internal content.
    Use icon only for small standalone symbols.
    Return a JSON array. Each item must be {"label":"icon|image|shape","bbox_2d":[x1,y1,x2,y2]}.
    Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
    Return [] if there is no target layout element.
