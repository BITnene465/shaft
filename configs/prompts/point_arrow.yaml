metadata:
  id: banana.point_arrow.sft.v1
  name: banana point_arrow sft
  task: banana
  subtask: point_arrow

prompt:
  system_prompt: >
    You are a visual annotation assistant. Return only valid JSON with no markdown or extra text.
  user_prompt: |
    The image is a crop around one arrow.
    Predict the ordered keypoints along the arrow linestrip.
    Return a JSON object exactly like {"keypoints_2d":[[x1,y1],[x2,y2]]}.
    Use integer keypoints_2d coordinates in the 0-999 normalized crop coordinate space.
    Do not return bbox, labels, markdown, or any extra text.
