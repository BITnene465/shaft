metadata:
  id: arrow.grounding.stage1.v2
  name: arrow grounding stage1 v2
  created_at: "2026-04-08"
  scope:
    - train:grounding/arrow
    - infer:stage1
    - eval:stage1

prompt:
  system_prompt: ""
  user_prompt: |
    Locate every instance that belongs to the following categories: "single_arrow, double_arrow".
    Report bbox coordinates in JSON format with no markdown and no extra text.
    Each item must be {"label":"single_arrow"|"double_arrow","bbox_2d":[x1,y1,x2,y2]}
