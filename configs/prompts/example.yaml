metadata:
  id: shaft.example.prompt_pool.v1
  version: v1
  name: example prompt pool config
  task: grounding
  subtask: grounding_example
  target_labels: [example_label]

prompts:
  - id: main
    system_prompt: >
      You are a visual annotation assistant. Return only valid compact JSON. Do not
      include markdown, comments, explanations, or surrounding text.
    user_prompt: |
      Detect all visible example_label instances in the image.
      Return a JSON array of objects with this schema:
      {"label":"example_label","bbox_2d":[x1,y1,x2,y2]}
      Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
      Return [] when no target object is visible.

  - id: variant
    system_prompt: >
      Output only valid compact JSON. Do not include markdown, comments,
      explanations, or extra text.
    user_prompt: |
      Find every visible example_label object in the image.
      Return one tight bbox for each target object.
      Output a JSON array using this schema:
      {"label":"example_label","bbox_2d":[x1,y1,x2,y2]}
      Coordinates must be integers in the 0-999 normalized image coordinate space.
      Return [] if no target object is visible.
