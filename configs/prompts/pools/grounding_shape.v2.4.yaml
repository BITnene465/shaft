metadata:
  id: shaft.grounding_shape.prompt_pool.v2.4
  version: v2.4
  name: grounding shape detection prompt pool
  task: grounding
  subtask: grounding_shape
  target_labels: [shape]

prompts:
  - id: main
    system_prompt: >
      You are a visual annotation assistant. Return only valid compact JSON. Do not
      include markdown, comments, explanations, or surrounding text.
    user_prompt: |
      Detect all visible shape instances in the image.
      Use shape for simple non-icon geometric regions and diagram blocks.
      Do not return arrows, icons, or image regions.
      Use a tight bbox around each visible shape.
      Do not merge separate shapes into one bbox.
      Return a JSON array of objects with this schema:
      {"label":"shape","bbox_2d":[x1,y1,x2,y2]}
      Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
      Order objects from top to bottom; for objects on the same visual row, order from left to right.
      Return [] when no target object is visible.

  - id: simple_shapes
    system_prompt: >
      You are a visual annotation assistant. Output compact valid JSON only.
      Do not add markdown, comments, explanations, or surrounding text.
    user_prompt: |
      Find every visible shape instance in the image.
      Shape is a broad label: include PPT-style shapes, diagram blocks, containers, cards, panels, callouts, badges, flowchart nodes, filled regions, outlines, separators, decorative geometric areas, and other standalone graphic regions.
      Return plausible shape targets even when they are small, partially visible, lightly styled, or visually nested in a slide/layout.
      Do not annotate arrows, icons, photos, screenshots, or whole image regions as shape, but ordinary presentation/diagram graphic elements should be included.
      Return one tight bbox for each separate visible shape.
      Return a JSON array using this schema:
      {"label":"shape","bbox_2d":[x1,y1,x2,y2]}
      Coordinates must be integer bbox_2d values in the 0-999 normalized image coordinate space.
      Sort results top to bottom, and left to right within the same visual row.
      Return [] only if no visible shape-like graphic region is present.

  - id: shape_boxes
    system_prompt: >
      Return only valid compact JSON. Do not include markdown or explanatory text.
    user_prompt: |
      Locate all visible shape targets.
      Be inclusive: shape targets include geometric objects, presentation shapes, blocks, containers, frames, panels, circles, rectangles, rounded rectangles, polygons, lines used as standalone graphic separators, flowchart elements, and decorative regions.
      Many graphical objects in slides and diagrams should be labeled shape unless they are clearly arrows, icons, or image/photo regions.
      Use one tight bounding box for each separate shape.
      Output a JSON array of objects exactly in this form:
      {"label":"shape","bbox_2d":[x1,y1,x2,y2]}
      Use integer coordinates normalized to the 0-999 image coordinate space.
      Order the objects by visual reading order: top to bottom, then left to right.
      If there are no visible shape targets at all, output [].

  - id: visible_shape_instances
    system_prompt: >
      You are a visual annotation assistant. Respond with compact valid JSON only.
      Do not include markdown, comments, explanations, or any surrounding text.
    user_prompt: |
      Annotate every visible shape instance in the image.
      Treat shape broadly: presentation blocks, diagram nodes, cards, containers, labels, frames, background panels, decorative graphic regions, geometric areas, and standalone visual regions are shape targets.
      Include small, partial, low-contrast, nested, or stylized shape-like objects when they are visible.
      Do not return arrows, icons, photos, screenshots, or whole image regions, but do return ordinary slide/diagram graphic shapes.
      Use one tight bbox around each separate shape.
      Return a JSON array of objects with this schema:
      {"label":"shape","bbox_2d":[x1,y1,x2,y2]}
      Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
      Sort objects from top to bottom, then left to right within the same visual row.
      Return [] only when no visible shape-like graphic object exists.

  - id: geometric_shape_boxes
    system_prompt: >
      Output only valid compact JSON. Do not output markdown, comments, explanations,
      code fences, or extra text.
    user_prompt: |
      Detect shape objects and return their tight bounding boxes.
      Be recall-oriented: include PPT-style shapes, flowchart boxes, grouped diagram regions, containers, cards, panels, callouts, decorative geometric regions, background blocks, separators, and other non-photo graphic areas.
      Exclude only clear non-shape targets such as arrows, icons, photos, screenshots, and complete image regions.
      Keep separate shape instances as separate JSON objects.
      Output a JSON array in this exact object schema:
      {"label":"shape","bbox_2d":[x1,y1,x2,y2]}
      Coordinates are integers normalized to the 0-999 image coordinate space.
      Use row-major order: top to bottom, then left to right.
      If no visible shape target exists at all, output [].
