metadata:
  id: shaft.grounding_arrow.prompt_pool.v2.4
  version: v2.4
  name: grounding arrow detection prompt pool
  task: grounding
  subtask: grounding_arrow
  target_labels: [arrow]

prompts:
  - id: main
    sampling_weight: 1.0
    system_prompt: >
      You are a visual annotation assistant. Return only valid compact JSON. Do not
      include markdown, comments, explanations, or surrounding text.
    user_prompt: |
      Detect all visible arrow instances in the image.
      Only count arrows with visible arrowheads; plain lines without arrowheads are not arrows.
      Arrows may be single-headed or double-headed.
      Use a tight bbox around the visible arrow body and arrowhead.
      Do not merge separate arrow instances into one bbox.
      Return a JSON array of objects with this schema:
      {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}
      Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
      Order objects from top to bottom; for objects on the same visual row, order from left to right.
      Return [] when no target object is visible.

  - id: find_all_arrows
    sampling_weight: 1.0
    system_prompt: >
      You are a visual annotation assistant. Output compact valid JSON only.
      Do not add markdown, comments, explanations, or surrounding text.
    user_prompt: |
      Find every visible arrow object in the image.
      Count only objects that have at least one visible arrowhead; plain line segments are not arrows.
      Single-headed and double-headed arrows are both valid targets.
      Be recall-oriented: include small, faint, thin, partially visible, curved, diagonal, connector-style, or diagram arrows when an arrowhead is visible.
      If a mark plausibly functions as an arrow and its head can be seen, return it instead of dropping it.
      Draw one tight bbox around each arrow body together with its arrowhead.
      Keep separate arrow objects as separate JSON objects.
      Return a JSON array using this schema:
      {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}
      Coordinates must be integer bbox_2d values in the 0-999 normalized image coordinate space.
      Sort results top to bottom, and left to right within the same visual row.
      Return [] only after carefully checking that no arrowhead-bearing arrow is visible.

  - id: bbox_arrows
    sampling_weight: 1.0
    system_prompt: >
      Return only valid compact JSON. Do not include markdown or explanatory text.
    user_prompt: |
      Locate all visible arrows and return their tight bounding boxes.
      An arrow must include a visible arrowhead. Do not mark ordinary lines without arrowheads.
      Include both one-way and two-way arrows, including tiny UI arrows, thin connector arrows, curved arrows, diagonal arrows, and partially visible arrows.
      Prefer high recall: when the arrowhead is visible but the shaft is short, faint, or partly occluded, still return the arrow.
      The bbox should cover the visible shaft and arrowhead of a single arrow instance.
      Do not combine different arrow instances.
      Output a JSON array of objects exactly in this form:
      {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}
      Use integer coordinates normalized to the 0-999 image coordinate space.
      Order the objects by visual reading order: top to bottom, then left to right.
      Output [] only if there is truly no visible arrow with an arrowhead.

  - id: visible_arrow_instances
    sampling_weight: 1.0
    system_prompt: >
      You are a visual annotation assistant. Respond with compact valid JSON only.
      Do not include markdown, comments, explanations, or any surrounding text.
    user_prompt: |
      Annotate every visible arrow instance in the image.
      A valid arrow has a visible arrowhead; a line, connector, or stroke without an arrowhead is not an arrow.
      Include single-headed and double-headed arrows.
      Small arrows, faint arrows, thin arrows, connector arrows, curved arrows, diagonal arrows, UI/navigation arrows, and partially visible arrows should still be returned when the arrowhead is visible.
      Do not be overly conservative: if the object clearly indicates direction with an arrowhead, include it.
      Use one tight bbox around each individual arrow, covering the visible shaft and arrowhead.
      Do not merge multiple arrow instances into one object.
      Return a JSON array of objects with this schema:
      {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}
      Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
      Sort objects from top to bottom, then left to right within the same visual row.
      Return [] only when no visible target arrow exists.

  - id: arrow_detection_strict_json
    sampling_weight: 1.0
    system_prompt: >
      Output only valid compact JSON. Do not output markdown, comments, explanations,
      code fences, or extra text.
    user_prompt: |
      Detect arrows in the image and return tight bounding boxes.
      Mark only arrows with visible arrowheads. Do not mark plain lines or non-arrow connectors.
      Both one-way arrows and two-way arrows are valid.
      Be inclusive for valid arrows: include subtle, small, short, thin, partial, curved, diagonal, and connector-style arrows whenever the arrowhead is visible.
      Avoid empty output unless the image has no visible arrowhead-bearing directional mark.
      Each detected object must be one separate arrow instance.
      The bbox should tightly enclose the visible arrow body plus the arrowhead.
      Output a JSON array in this exact object schema:
      {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}
      Coordinates are integers normalized to the 0-999 image coordinate space.
      Use row-major order: top to bottom, then left to right.
      If no arrow with a visible arrowhead is present after careful inspection, output [].
