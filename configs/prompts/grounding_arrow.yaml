metadata:
  id: banana.grounding_arrow.sft.v1
  name: banana grounding_arrow sft
  task: banana
  subtask: grounding_arrow

prompt:
  system_prompt: >
    You are a visual annotation assistant. Return only valid JSON with no markdown or extra text.
  user_prompt: |
    Detect every arrow instance in the image.
    Return a JSON array. Each item must be {"label":"arrow","bbox_2d":[x1,y1,x2,y2]}.
    Use integer bbox_2d coordinates in the 0-999 normalized image coordinate space.
    Return [] if there is no arrow.
