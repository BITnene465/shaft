experiment:
  name: qwen3vl-s1-lora
  output_dir: outputs/qwen3vl-s1-lora
  seed: 42

model:
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: false
  train_projector: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 200704
  max_pixels: 1048576

tokenizer:
  num_bins: 1000
  add_eos_token: true

task:
  route: grounding/arrow
  route_options:
    grounding/arrow:
      bbox_token_loss_weight: 1.3
      label_token_loss_weight: 1.0
      bbox_iou_threshold: 0.5

prompt:
  profile: arrow.grounding.stage1.v2

data:
  registry_path: configs/data_registry/arrow.yaml
  train_datasets:
    - stage1_grounding_arrow
  val_datasets:
    - stage1_grounding_arrow
  num_workers: 16
  pin_memory: true
  persistent_workers: true

finetune:
  mode: lora

lora:
  enabled: true
  adapter_type: dora
  r: 32
  alpha: 64
  dropout: 0
  bias: none
  # Language tower LoRA targets.
  lang_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  # Visual tower LoRA targets; only used when freeze_vision_tower=false.
  vis_target_modules:
    - attn.qkv
    - attn.proj
    - mlp.linear_fc1
    - mlp.linear_fc2
  # Projector LoRA targets; empty means all linear layers matched by projector_name_substrings.
  proj_target_modules: []

train:
  epochs: 5
  per_device_batch_size: 4
  grad_accum_steps: 2
  gradient_checkpointing: true
  learning_rate: 0
  lora_learning_rate: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 0
  log_every_steps: 80
  eval_every_steps: 400
  save_every_steps: 400
  save_step_checkpoints: false
  keep_last_n_checkpoints: 2
  find_unused_parameters: false

eval:
  per_device_batch_size: 16
  max_new_tokens: 2048
  num_beams: 1
  do_sample: false
  use_cache: true
  best_metric: val/bbox_f1_at_iou50
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det_json
  run_name: qwen3vl-s1-lora
  progress_ncols: 88

checkpoint:
  init_from: null
  resume_from: null
