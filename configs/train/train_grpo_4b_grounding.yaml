experiment:
  name: qwen3vl-grpo-4b-grounding-v2-onlineeval-full-g8-bs32
  output_dir: outputs/qwen3vl-grpo/4b/grounding-iou-v2-onlineeval-full-g8-bs32
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  template: qwen3vl
  trust_remote_code: true
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16
  finetune:
    mode: full
    target_modules: ["all-linear"]
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.0

algorithm:
  name: grpo

data:
  datasets:
    - dataset_name: grounding_arrow
      source_type: jsonl_sft
      train_path: ../../data/grounding_arrow/sft/train.jsonl
      val_path: ../../data/grounding_arrow/sft/val.jsonl
      weight: 1
    - dataset_name: grounding_layout
      source_type: jsonl_sft
      train_path: ../../data/grounding_layout/sft/train.jsonl
      val_path: ../../data/grounding_layout/sft/val.jsonl
      weight: 2
  mix_strategy: interleave_under
  mix_refresh: static
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  min_pixels: 4096
  max_pixels: 262144

train:
  epochs: 1
  max_steps: -1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-6
  optimizer_name: adamw_torch
  scheduler_name: cosine
  loss_name: auto
  bf16: true
  use_cpu: false
  warmup_ratio: 0.05
  logging_steps: 1
  save_strategy: steps
  save_steps: 200
  save_total_limit: 4
  report_to: ["wandb"]
  load_best_model_at_end: true
  save_final_model: true
  save_final_state: true
  gradient_checkpointing: true

eval:
  enabled: true
  per_device_eval_batch_size: 8
  eval_strategy: steps
  eval_steps: 200
  loss_metrics_enabled: false
  do_sample: false
  temperature: 0.0
  max_new_tokens: 2048
  online_metrics_enabled: true
  metric_for_best_model: eval_final_score
  greater_is_better: true
  datasets:
    grounding_arrow:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 2
    grounding_layout:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 2

rlhf:
  enabled: true
  grpo:
    beta: 0.02
    rollout:
      num_generations: 8
      num_generations_eval: 1
      max_completion_length: 1024
      temperature: 0.7
      top_p: 0.95
      top_k: 0
      repetition_penalty: 1.0
    vllm:
      enabled: true
      mode: colocate
      model_impl: vllm
      gpu_memory_utilization: 0.30
      max_model_length: 8192
      tensor_parallel_size: 1
      enable_sleep_mode: false
    reward_functions:
      - name: parse_success
        codec: json_list
        weight: 0.10
      - name: grounding_det_f1
        codec: json_list
        weight: 1.0
        params:
          iou_threshold: 0.5
      - name: grounding_iou
        codec: json_list
        weight: 0.30
        params:
          min_iou: 0.3
