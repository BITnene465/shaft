experiment:
  name: qwen3vl-grpo-4b-grounding-full-g8-bs32
  output_dir: outputs/qwen3vl-grpo/4b/grounding-iou-v1-full-g8-bs32
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  template: qwen3vl
  trust_remote_code: true
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16
  finetune:
    mode: full
    target_modules: ["all-linear"]
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.0

algorithm:
  name: grpo

data:
  datasets:
    - dataset_name: grounding_arrow
      source_type: jsonl_sft
      train_path: ../../data/grounding_arrow/sft/train.jsonl
      weight: 1
    - dataset_name: grounding_layout
      source_type: jsonl_sft
      train_path: ../../data/grounding_layout/sft/train.jsonl
      weight: 2
  mix_strategy: interleave_under
  mix_refresh: static
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  min_pixels: 4096
  max_pixels: 262144

train:
  epochs: 1
  max_steps: -1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  optimizer_name: adamw_torch
  scheduler_name: cosine
  loss_name: auto
  bf16: true
  use_cpu: false
  logging_steps: 1
  save_strategy: steps
  save_steps: 50
  save_total_limit: 2
  report_to: ["wandb"]
  load_best_model_at_end: false
  save_final_model: true
  save_final_state: true
  gradient_checkpointing: true

eval:
  enabled: false

rlhf:
  enabled: true
  grpo:
    beta: 0.0
    rollout:
      num_generations: 8
      num_generations_eval: 1
      max_completion_length: 1024
      temperature: 1.0
      top_p: 1.0
      top_k: 0
      repetition_penalty: 1.0
    vllm:
      enabled: true
      mode: colocate
      model_impl: vllm
      gpu_memory_utilization: 0.25
      max_model_length: 8192
      tensor_parallel_size: 1
      enable_sleep_mode: false
    reward_functions:
      - name: parse_success
        codec: json_list
        weight: 0.05
      - name: grounding_iou
        codec: json_list
        weight: 1.0
        params:
          min_iou: 0.0
