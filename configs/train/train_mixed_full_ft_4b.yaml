experiment:
  name: qwen3vl-mixed-full-ft-4b
  output_dir: outputs/qwen3vl-mixed-full-ft/4b
  seed: 42

model:
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: false
  train_projector: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector

tokenizer:
  num_bins: 1000
  add_eos_token: true

task:
  mix_strategy: interleave_under
  route_options:
    grounding/arrow:
      mix_weight: 4.0
      bbox_iou_threshold: 0.5
      eval_primary_metric: bbox_f1_at_iou50
      eval_metric_weight: 0.5
      eval_metric_normalizer: identity
    keypoint_sequence/arrow:
      mix_weight: 1.0
      strict_point_distance_px: 8.0
      eval_primary_metric: end_to_end_score
      eval_metric_weight: 0.5
      eval_metric_normalizer: identity

prompt:
  route_prompts:
    grounding/arrow:
      profile: arrow.grounding.stage1.v2
    keypoint_sequence/arrow:
      profile: arrow.keypoint_sequence.stage2_fixed.v2

data:
  registry_path: configs/data_registry/arrow.yaml
  train_datasets:
    - stage1_grounding_arrow
    - stage2_keypoint_sequence_arrow
  val_datasets:
    - stage1_grounding_arrow
    - stage2_keypoint_sequence_arrow
  min_pixels: 200704
  max_pixels: 1048576
  route_pixel_budgets:
    grounding/arrow:
      min_pixels: 200704
      max_pixels: 1048576
    keypoint_sequence/arrow:
      min_pixels: 50176
      max_pixels: 262144
  num_workers: 16
  pin_memory: true
  persistent_workers: true

finetune:
  mode: full

train:
  epochs: 3
  per_device_batch_size: 4
  grad_accum_steps: 2
  gradient_checkpointing: true
  learning_rate: 0.00001
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 0
  log_every_steps: 80
  eval_every_steps: 400
  save_every_steps: 400
  save_step_checkpoints: false
  keep_last_n_checkpoints: 2
  find_unused_parameters: false

eval:
  per_device_batch_size: 16
  max_new_tokens: 2048
  num_beams: 1
  do_sample: false
  use_cache: true
  best_metric: val/multi_task_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det_json
  run_name: qwen3vl-mixed-full-ft-4b
  progress_ncols: 88

checkpoint:
  init_from: null
  resume_from: null
