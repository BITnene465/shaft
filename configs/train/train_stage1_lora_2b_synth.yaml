experiment:
  name: qwen3vl-s1-lora
  output_dir: outputs/qwen3vl-s1-lora
  seed: 42

model:
  model_name_or_path: models/Qwen3-VL-2B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: false
  train_projector: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 200704
  max_pixels: 1048576

tokenizer:
  num_bins: 1000
  add_eos_token: true

task:
  task_type: grounding
  domain_type: arrow
  route_options:
    grounding/arrow:
      bbox_token_loss_weight: 1.5
      label_token_loss_weight: 1.0

prompt:
  system_prompt: ""
  user_prompt: |
    Detect all arrows in the image and return their bounding boxes as a JSON array.
    Use relative coordinates in [0,999].
    Each item must be {"label":"single_arrow"|"double_arrow","bbox_2d":[x1,y1,x2,y2]}.

data:
  train_path: data/sync_arrow_grounding/avg/train.jsonl
  val_path: data/two_stage/stage1/val_full.jsonl
  num_workers: 16
  pin_memory: true
  persistent_workers: true

finetune:
  mode: lora

lora:
  enabled: true
  r: 32
  alpha: 64
  dropout: 0
  bias: none
  lang_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  vis_target_modules:
    - attn.qkv
    - attn.proj
    - mlp.linear_fc1
    - mlp.linear_fc2
  proj_target_modules: []
  lm_head_target_modules:
    - lm_head

train:
  epochs: 2
  per_device_batch_size: 4
  grad_accum_steps: 2
  gradient_checkpointing: true
  learning_rate: 0.00001
  lora_learning_rate: 0.00002
  weight_decay: 0.01
  warmup_ratio: 0.05
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 0
  log_every_steps: 80
  eval_every_steps: 400
  save_every_steps: 400
  save_step_checkpoints: false
  keep_last_n_checkpoints: 2
  find_unused_parameters: false

eval:
  per_device_batch_size: 16
  max_new_tokens: 2048
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  monitor_metric: val/bbox_f1_at_iou50
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det_json
  run_name: qwen3vl-s1-lora
  progress_ncols: 88

checkpoint:
  init_from: null
  resume_from: null
