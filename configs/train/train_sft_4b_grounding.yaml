experiment:
  name: qwen3vl-4b-sft-grounding-row-bucket-v2-under
  output_dir: outputs/qwen3vl-sft/4b/grounding-row-bucket-v2-under
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16
  finetune:
    mode: full
    target_modules: ["auto"]
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    lora_bias: none
    use_rslora: false
    qlora_load_in_4bit: true
    qlora_use_double_quant: true
    qlora_quant_type: nf4
    qlora_compute_dtype: bfloat16

algorithm:
  name: sft
  params: {}

data:
  catalog_path: ../data/arrow.yaml
  catalog_names: [grounding_arrow, grounding_layout, keypoint_arrow, grounding_arrow_syn_avg]
  mix_strategy: interleave_under
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  min_pixels: 200704
  max_pixels: 1048576
  add_eos_token: true
  shuffle: true

train:
  epochs: 10
  max_steps: -1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  learning_rate: 0.00002
  param_group_lrs:
    vision_tower: 0.000005
    aligner: 0.000005
  optimizer_name: adamw_torch
  scheduler_name: auto
  scheduler_num_cycles: 0.5
  scheduler_power: 1.0
  loss_name: auto
  loss_scale: default
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 50
  save_strategy: epoch
  save_steps: 200
  save_total_limit: 6
  load_best_model_at_end: true
  save_final_model: true
  save_final_state: true
  ddp_find_unused_parameters: false
  report_to: ["wandb"]
  init_from_checkpoint:
  resume_from_checkpoint:

eval:
  enabled: true
  per_device_eval_batch_size: 2
  eval_strategy: epoch
  eval_steps: 200
  do_sample: false
  temperature: 0.0
  max_new_tokens: 2048
  metric_for_best_model: eval_loss
  greater_is_better: false

plugins:
  hooks: []

logging:
  level: INFO
  fmt: text
  file_path:
  rank_zero_only: true

progress:
  enabled: true
  leave: true
  mininterval: 0.2
