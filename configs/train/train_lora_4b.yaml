experiment:
  name: qwen3vl-lora
  output_dir: outputs/qwen3vl-lora
  seed: 42

model:
  # 默认优先使用本地 models 目录中的模型；若本地不存在，再回退到远端仓库 ID。
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: true
  train_projector: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  # 受控动态分辨率，而不是原生大图直接输入。
  # 这里保留长宽比，只限制总像素预算。默认先收紧到 1024 x 1024，
  # 优先保证显存稳定和训练闭环。
  min_pixels: 200704
  # 1024 x 1024 total pixel budget: 1,048,576
  max_pixels: 1048576

tokenizer:
  # grounding 坐标统一归一化到 0~999 的整数网格
  num_bins: 1000
  add_eos_token: true

task:
  route: joint_structure/arrow
  route_options:
    joint_structure/arrow: {}

prompt:
  profile: arrow.joint_structure.one_stage.v1

data:
  registry_path: configs/data_registry/arrow.yaml
  train_datasets:
    - joint_structure_arrow
  val_datasets:
    - joint_structure_arrow
  num_workers: 16
  pin_memory: true
  persistent_workers: true

finetune:
  # LoRA-only
  mode: lora

lora:
  enabled: true
  adapter_type: dora
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  # Language tower LoRA targets.
  lang_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  # Visual tower LoRA targets; only used when freeze_vision_tower=false.
  vis_target_modules:
    - attn.qkv
    - attn.proj
    - mlp.linear_fc1
    - mlp.linear_fc2
  # Projector LoRA targets; empty means all linear layers matched by projector_name_substrings.
  proj_target_modules: []

train:
  epochs: 3
  per_device_batch_size: 2
  grad_accum_steps: 2
  gradient_checkpointing: true
  learning_rate: 0.00005
  lora_learning_rate: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 0
  log_every_steps: 40
  eval_every_steps: 200
  save_every_steps: 200
  save_step_checkpoints: false
  keep_last_n_checkpoints: 2
  find_unused_parameters: false

eval:
  per_device_batch_size: 16
  max_new_tokens: 2048
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  strict_point_distance_px: 8.0
  best_metric: val/end_to_end_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det_json
  run_name: qwen3vl-lora
  progress_ncols: 88

checkpoint:
  init_from: null
  resume_from: null
