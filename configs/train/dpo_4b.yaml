experiment:
  name: qwen3vl-dpo-4b
  output_dir: outputs/qwen3vl-dpo/4b/default
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  template: qwen3vl
  trust_remote_code: true
  # Optional: set to flash_attention_2 after installing `uv pip install -e ".[gpu-kernels]"`.
  attn_implementation:
  torch_dtype: bfloat16
  finetune:
    mode: lora
    target_modules: ["all-linear"]
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.0

algorithm:
  name: dpo

data:
  batching:
    grouping: none
    cardinality: fixed
    packing:
      mode: none
    layout: padded
  catalog_path: ../data/example.yaml
  catalog_names: [dpo_pairwise]
  schedule:
    mixing: weighted
    shuffle: true
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  min_pixels: 200704
  max_pixels: 1048576

train:
  duration:
    unit: epochs
    value: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  optimizer_name: adamw_torch
  scheduler_name: cosine
  loss_name: auto
  bf16: true
  use_cpu: false
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 3
  report_to: ["wandb"]
  load_best_model_at_end: true
  save_final_model: true
  save_final_state: true
eval:
  enabled: true
  eval_strategy: epoch
  per_device_eval_batch_size: 1
  metric_for_best_model: eval_loss
  greater_is_better: false

rlhf:
  enabled: true
  dpo:
    beta: 0.1
    label_smoothing: 0.0
    loss_type: sigmoid
    precompute_ref_log_probs: false
    use_weighting: false
