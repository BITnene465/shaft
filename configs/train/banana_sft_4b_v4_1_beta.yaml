# Banana v4.1-beta SFT training config.
# 4B from-scratch SFT run from Qwen3-VL-4B-Instruct.
# Main objective: learn layout/arrow capability together with draw.io shape
# reconstruction business fields.
experiment:
  name: banana-v4.1-beta-qwen3vl-sft-4b
  output_dir: outputs/qwen3vl-sft/4b/banana-v4.1-beta
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16
  finetune:
    mode: full
    target_modules: ["auto"]
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.0
    lora_bias: none
    use_rslora: false
    qlora_load_in_4bit: true
    qlora_use_double_quant: true
    qlora_quant_type: nf4
    qlora_compute_dtype: bfloat16

algorithm:
  name: sft
  params: {}

data:
  batching:
    grouping: none
    cardinality: fixed
    packing:
      mode: none
    layout: padded
  catalog_path: ../data/banana_v4_1_beta.yaml
  catalog_names:
    - grounding_arrow
    - grounding_layout
    - grounding_shape
    - grounding_icon_image
    - point_arrow
    - lin_point_arrow_style
    - drawio_shape
  transforms:
    prompt_sampling:
      enabled: true
      train_only: true
      pools:
        grounding_arrow: ../prompts/pools/grounding_arrow.v2.4.yaml
        grounding_layout: ../prompts/pools/grounding_layout.v2.4.yaml
        grounding_shape: ../prompts/pools/grounding_shape.v2.4.yaml
        grounding_icon_image: ../prompts/pools/grounding_icon_image.v2.4.yaml
        point_arrow: ../prompts/pools/point_arrow.v2.4.yaml
        lin_point_arrow_style: ../prompts/pools/point_arrow_style.v2.4.yaml
        drawio_shape: ../prompts/pools/drawio_shape.v4.0.yaml
  schedule:
    mixing: weighted
    shuffle: true
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  min_pixels: 200704
  max_pixels: 2000000
  max_length: 5500
  add_eos_token: true

train:
  duration:
    unit: steps
    value: 16000
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  learning_rate: 0.00002
  param_group_lrs:
    vision_tower: 0.00001
    aligner: 0.00001
  no_decay_name_patterns:
    - embed_tokens.weight
  optimizer_name: adamw_torch
  scheduler_name: auto
  scheduler_num_cycles: 0.5
  scheduler_power: 1.0
  loss_name: auto
  loss_scale: default
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  weight_decay: 0.03
  warmup_ratio: 0.15
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 50
  save_strategy: steps
  save_epoch_interval: 1
  save_steps: 2000
  save_total_limit: 30
  load_best_model_at_end: false
  save_final_model: true
  save_final_state: true
  ddp_find_unused_parameters: false
  report_to: ["wandb"]
  init_from_checkpoint:
  resume_from_checkpoint:

eval:
  enabled: true
  per_device_eval_batch_size: 1
  eval_strategy: no
  epoch_interval: 1
  eval_steps: 200
  loss_metrics_enabled: false
  do_sample: false
  temperature: 0.0
  max_new_tokens: 4096
  online_metrics_enabled: false
  metric_for_best_model: eval_loss
  greater_is_better: false
  datasets:
    grounding_arrow:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 2
    grounding_layout:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 2
    grounding_shape:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 1
    grounding_icon_image:
      prediction_codec: json_list
      target_adapter: target_text
      target_adapter_params:
        codec: json_list
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: det_f1
        - name: det_iou
      primary_metric: det_f1
      normalizer:
        type: identity
      weight: 1
    point_arrow:
      prediction_codec: json_object
      target_adapter: target_text
      target_adapter_params:
        codec: json_object
      metrics:
        - name: parse_success
        - name: parse_partial_rate
        - name: keypoint_pck
          params:
            coordinate_space: normalized_1000
            num_bins: 1000
      primary_metric: keypoint_pck
      normalizer:
        type: identity
      weight: 1

plugins:
  hooks: []

logging:
  level: INFO
  fmt: text
  file_path:
  rank_zero_only: true

progress:
  enabled: true
  display: auto
  width: 72
  refresh_interval: 0.5
  log_interval: 30.0
  leave_completed: false
  persist: true
