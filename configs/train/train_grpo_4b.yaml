experiment:
  name: qwen3vl-grpo-4b
  output_dir: outputs/qwen3vl-grpo/4b/default
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  template: qwen3vl
  trust_remote_code: true
  # Optional: set to flash_attention_2 after installing `uv pip install -e ".[gpu-kernels]"`.
  attn_implementation:
  torch_dtype: bfloat16
  finetune:
    mode: lora
    target_modules: ["all-linear"]
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.0

algorithm:
  name: grpo

data:
  catalog_path: ../data/example.yaml
  catalog_names: [grpo_prompt_target]
  mix_strategy: interleave_under
  mix_refresh: static
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  min_pixels: 200704
  max_pixels: 1048576

train:
  epochs: 1
  max_steps: -1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  optimizer_name: adamw_torch
  scheduler_name: cosine
  loss_name: auto
  bf16: true
  use_cpu: false
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 3
  report_to: ["wandb"]
  load_best_model_at_end: true
  save_final_model: true
  save_final_state: true
eval:
  enabled: true
  eval_strategy: epoch
  per_device_eval_batch_size: 1
  metric_for_best_model: eval_loss
  greater_is_better: false

rlhf:
  enabled: true
  grpo:
    beta: 0.0
    rollout:
      num_generations: 8
      num_generations_eval: 1
      max_completion_length: 128
      temperature: 1.0
      top_p: 1.0
      top_k: 0
      repetition_penalty: 1.0
    vllm:
      enabled: false
      mode: server
    reward_functions:
      - name: exact_match
        codec: json_any
        weight: 1.0
