# 注意：PPO 当前为暂停项（仅 smoke/debug），详见 docs/ppo_todo.md。
experiment:
  name: qwen3vl-ppo-4b
  output_dir: outputs/qwen3vl-ppo/4b/default
  seed: 42

model:
  model_type: qwen3vl
  model_name_or_path: models/Qwen3-VL-4B-Instruct
  template: qwen3vl
  trust_remote_code: true
  # Optional: set to flash_attention_2 after installing `uv pip install -e ".[gpu-kernels]"`.
  attn_implementation:
  torch_dtype: bfloat16
  finetune:
    mode: lora
    target_modules: ["all-linear"]
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.0

algorithm:
  name: ppo

data:
  registry_path: ../data/datasets.yaml
  dataset_refs: [ppo_rollout]
  mix_strategy: interleave_under
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  min_pixels: 200704
  max_pixels: 1048576

sft:
  train:
    epochs: 1
    max_steps: -1
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 1
    learning_rate: 1.0e-5
    optimizer_name: adamw_torch
    scheduler_name: cosine
    loss_name: auto
    bf16: true
    use_cpu: false
    logging_steps: 10
    save_strategy: epoch
    save_total_limit: 3
    report_to: ["wandb"]
    load_best_model_at_end: true
    save_final_model: true
    save_final_state: true
  eval:
    enabled: true
    eval_strategy: epoch
    per_device_eval_batch_size: 1
    metric_for_best_model: eval_loss
    greater_is_better: false

rlhf:
  enabled: true
  ppo:
    cliprange: 0.2
    cliprange_value: 0.2
    kl_coef: 0.02
    vf_coef: 0.1
    gamma: 1.0
    lam: 0.95
    whiten_rewards: false
    response_length: 128
    temperature: 1.0
    num_ppo_epochs: 4
    num_mini_batches: 1
    local_rollout_forward_batch_size: 16
    num_sample_generations: 0
    stop_token: eos
    value_model_mode: shared_backbone
    reward_model_mode: adapter_disabled_policy
    train_value_backbone: false
    allow_untrained_reward_model: false
    allow_text_only_multimodal_ppo: false
