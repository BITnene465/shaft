experiment:
  name: qwen3vl-s2-lora
  output_dir: outputs/qwen3vl-s2-lora
  seed: 42

model:
  model_name_or_path: models/Qwen3-VL-2B-Instruct
  remote_model_name_or_path: Qwen/Qwen3-VL-2B-Instruct
  trust_remote_code: true
  attn_implementation: flash_attention_2
  freeze_vision_tower: false
  train_projector: true
  vision_name_substrings:
    - visual
  projector_name_substrings:
    - merger
    - projector
    - multi_modal_projector
  min_pixels: 50176
  max_pixels: 262144

tokenizer:
  num_bins: 1000
  add_eos_token: true

task:
  task_type: keypoint_sequence
  domain_type: arrow
  route_options:
    keypoint_sequence/arrow:
      coordinate_token_loss_weight: 1.5

prompt:
  system_prompt: ""
  user_prompt: ""
  user_prompt_template: |
    The target arrow in this crop is specified by:
    {"label":"{{label}}","bbox_2d":{{bbox_2d}}}
    Output only a JSON object in [0,999].
    Format: {"keypoints_2d":[[x0,y0],[x1,y1],...]}
    Return the skeleton of this target arrow only.
    For single_arrow, output the skeleton from tail to head.
    For double_arrow, output the skeleton from the upper-left head to the other head.

data:
  train_path: data/two_stage/stage2/train.jsonl
  val_path: data/two_stage/stage2/val.jsonl
  num_workers: 8
  pin_memory: true
  persistent_workers: true

finetune:
  mode: lora

lora:
  enabled: true
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  # Language tower LoRA targets.
  lang_target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  # Visual tower LoRA targets; only used when freeze_vision_tower=false.
  vis_target_modules:
    - attn.qkv
    - attn.proj
    - mlp.linear_fc1
    - mlp.linear_fc2
  # Projector LoRA targets; empty means all linear layers matched by projector_name_substrings.
  proj_target_modules: []
  lm_head_target_modules:
    - lm_head

train:
  epochs: 4
  per_device_batch_size: 16
  grad_accum_steps: 1
  gradient_checkpointing: true
  learning_rate: 0.00005
  lora_learning_rate: 0.0001
  weight_decay: 0.01
  warmup_ratio: 0.1
  scheduler_type: cosine
  max_grad_norm: 1.0
  bf16: true
  eval_strategy: epoch
  eval_start_epoch: 0
  log_every_steps: 40
  eval_every_steps: 200
  save_every_steps: 200
  save_step_checkpoints: false
  keep_last_n_checkpoints: 2
  find_unused_parameters: false

eval:
  per_device_batch_size: 16
  max_new_tokens: 256
  num_beams: 1
  do_sample: false
  use_cache: true
  bbox_iou_threshold: 0.5
  strict_point_distance_px: 8.0
  monitor_metric: val/end_to_end_score
  monitor_mode: max

logging:
  use_wandb: true
  project: vlm_det_json
  run_name: qwen3vl-s2-lora
  progress_ncols: 88

checkpoint:
  init_from: null
  resume_from: null
