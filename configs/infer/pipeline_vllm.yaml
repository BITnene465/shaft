engines:
  stage_model:
    backend: vllm_openai
    endpoint: http://127.0.0.1:8001
    served_model_name: arrow_mixed_4b
    model_type: qwen3vl
    request_timeout_seconds: 60
    generation:
      max_new_tokens: 512
      do_sample: false
      temperature: 0.0
      top_p: 1.0
      top_k: 50
      repetition_penalty: 1.0

stages:
  - name: detect
    engine: stage_model
    output_key: det_out
    user_prompt_template: "Locate objects and return JSON."
    codec: json_any
    min_pixels: 200704
    max_pixels: 1048576
    max_retries: 1
    retry_backoff_seconds: 0.0
    fail_fast: true

  - name: refine
    engine: stage_model
    output_key: final_out
    user_prompt_template: "Refine based on previous output: {det_out}"
    codec: text
    min_pixels: 313600
    max_pixels: 1254400
    max_retries: 0
    fail_fast: true
