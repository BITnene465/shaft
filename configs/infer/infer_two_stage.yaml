stage1:
  batch_size: 8
  task:
    task_type: grounding
    domain_type: arrow
  model:
    min_pixels: 200704
    max_pixels: 1048576
    # max_pixels: 2359296

  prompt:
    profile: arrow.grounding.stage1.v2
  eval:
    max_new_tokens: 2048
    num_beams: 1
    do_sample: false
    use_cache: true

stage2:
  task:
    task_type: keypoint_sequence
    domain_type: arrow
  model:
    min_pixels: 50176
    max_pixels: 262144
  prompt:
    profile: arrow.keypoint_sequence.stage2_template.v1
  batch_size: 32
  eval:
    max_new_tokens: 64
    num_beams: 1
    do_sample: false
    use_cache: true

padding_ratio: 0.3

app:
  host: 127.0.0.1
  port: 7861
  share: false

output_dir: null
