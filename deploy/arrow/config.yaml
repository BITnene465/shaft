protocol:
  labels:
    - single_arrow
    - double_arrow
  num_bins: 1000

stage1:
  route: grounding_arrow
  max_tokens: 2048
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  prompt: |
    Locate every instance that belongs to the following categories: "single_arrow, double_arrow".
    Report bbox coordinates in JSON format with no markdown and no extra text.
    Each item must be {"label":"single_arrow"|"double_arrow","bbox_2d":[x1,y1,x2,y2]}.

stage2:
  route: keypoint_sequence_arrow
  max_tokens: 64
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  prompt: |
    Predict the skeleton of the central main arrow in this crop and ignore other secondary arrows.
    Output only a JSON object.
    Format: {"keypoints_2d":[[x0,y0],[x1,y1],...]}.
    For single_arrow, output points from tail to head.
    For double_arrow, output points from the upper-left head to the other head.

pipeline:
  padding_ratio: 0.3
